# FORGE CONFIG (DO NOT REMOVE!)
include forge-conf/3264110/before/*;
include forge-conf/3264110/bdi2.jerome-arfouche.ca/before/*;

server {
    http2 on;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name bdi2.jerome-arfouche.ca;
    server_tokens off;
    root /home/forge/bdi2.jerome-arfouche.ca/current/dist;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /api/ {
        proxy_pass http://localhost:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.map$ {
        return 404;
    }

    location ~* \.(?:css|js)$ {
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location ~* \.(?:svg|ico)$ {
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # FORGE SSL (DO NOT REMOVE!)
    ssl_certificate /etc/nginx/ssl/domains/1763349/3561066/server.crt;
    ssl_certificate_key /etc/nginx/ssl/domains/1763349/3561066/server.key;

    include forge-conf/3264110/site.conf;
}

# FORGE CONFIG (DO NOT REMOVE!)
include forge-conf/3264110/after/*;
include forge-conf/3264110/bdi2.jerome-arfouche.ca/after/*;
<script>
let _csrfToken = null;
async function getCsrfToken() {
  if (!_csrfToken) {
    const r = await fetch('/api/csrf-token');
    const d = await r.json();
    _csrfToken = d.csrfToken;
  }
  return _csrfToken;
}

// ---------------------------------------------------------------------------
// Cognitive distortions
// ---------------------------------------------------------------------------
const DISTORTIONS = [
  { name: "Magnification & minimization", desc: "Exaggerating or minimizing the importance of events. Your achievements feel unimportant; your mistakes feel huge." },
  { name: "Catastrophizing", desc: "Seeing only the worst possible outcomes of a situation." },
  { name: "Overgeneralization", desc: "Making broad interpretations from a single or few events." },
  { name: "Magical thinking", desc: "The belief that thoughts, actions, or emotions influence unrelated situations." },
  { name: "Personalization", desc: "Believing you are responsible for events outside of your control." },
  { name: "Jumping to conclusions", desc: "Interpreting the meaning of a situation with little or no evidence." },
  { name: "Mind reading", desc: "Interpreting the thoughts and beliefs of others without adequate evidence." },
  { name: "Fortune telling", desc: "Expecting that a situation will turn out badly without adequate evidence." },
  { name: "Emotional reasoning", desc: "Assuming emotions reflect the way things really are." },
  { name: "Disqualifying the positive", desc: "Focusing on the negative while ignoring the positive parts of a situation." },
  { name: "“Should” statements", desc: "Believing things should be a certain way." },
  { name: "All-or-nothing thinking", desc: "Thinking in absolutes such as “always,” “never,” or “every.”" },
];

// ---------------------------------------------------------------------------
// Steps
// ---------------------------------------------------------------------------
const STEPS = [
  {
    key: "datetime",
    title: "When is this happening?",
    help: "We’ll stamp the record with this date and time.",
    fields: [{ key: "datetime", type: "datetime-local", label: "Date and time" }],
  },
  {
    key: "situation",
    title: "What’s the situation?",
    help: "What event, unhelpful behavior, or unpleasant emotion is this connected to? It can be external (something that happened) or internal (an emotion, sensation, image, or stream of thoughts).",
    fields: [{ key: "situation", type: "textarea", label: "Describe the situation", placeholder: "What was happening?" }],
  },
  {
    key: "automaticThought",
    title: "What went through your mind?",
    help: "When you noticed your mood shift, what thought or image came up? Write it as it appeared, even if it doesn’t sound rational.",
    fields: [
      { key: "automaticThought", type: "textarea", label: "Automatic thought(s) or image(s)", placeholder: "The thought, in your own words" },
      { key: "thoughtBelief", type: "slider", label: "How much do you believe this thought right now?", min: 0, max: 100, suffix: "%", default: 50 },
    ],
  },
  {
    key: "emotion",
    title: "What are you feeling?",
    help: "Name the emotion (sad, anxious, angry, ashamed, hopeless, etc.). Use one word per emotion if you can.",
    fields: [
      { key: "emotion", type: "text", label: "Emotion(s)", placeholder: "e.g. anxious, ashamed" },
      { key: "emotionIntensity", type: "slider", label: "How intense is the emotion?", min: 0, max: 100, suffix: "%", default: 50 },
    ],
  },
  {
    key: "distortions",
    title: "Any cognitive distortions at play?",
    help: "Pick any that fit the automatic thought above. More than one can apply — it’s okay to skip if none feel right.",
    fields: [{ key: "distortions", type: "distortions" }],
  },
  {
    key: "evidenceFor",
    title: "Evidence the thought is true",
    help: "What facts support the automatic thought? Stick to evidence, not feelings or interpretations.",
    fields: [{ key: "evidenceFor", type: "textarea", label: "Evidence supporting the thought", placeholder: "Just the facts" }],
  },
  {
    key: "evidenceAgainst",
    title: "Evidence the thought is not true",
    help: "What facts contradict the automatic thought, or show it isn’t 100% accurate?",
    fields: [{ key: "evidenceAgainst", type: "textarea", label: "Evidence against the thought", placeholder: "Facts that push back" }],
  },
  {
    key: "alternative",
    title: "Is there another way to look at this?",
    help: "What’s an alternative explanation, or a different angle on the situation?",
    fields: [{ key: "alternative", type: "textarea", label: "Alternative explanation", placeholder: "A more balanced read" }],
  },
  {
    key: "coping",
    title: "If the worst happened — what then?",
    help: "If the worst case actually came true, how could you cope? What is the best that could happen? What is most realistic?",
    fields: [{ key: "coping", type: "textarea", label: "Worst case, best case, most realistic", placeholder: "" }],
  },
  {
    key: "effect",
    title: "What does believing this thought cost you?",
    help: "What’s the effect of believing the automatic thought? What might change if you believed something different?",
    fields: [{ key: "effect", type: "textarea", label: "Effect of believing vs. changing the thought", placeholder: "" }],
  },
  {
    key: "friend",
    title: "What would you tell a friend?",
    help: "If someone you cared about was in this exact situation and had this same thought, what would you say to them?",
    fields: [{ key: "friend", type: "textarea", label: "What you’d tell a friend", placeholder: "" }],
  },
  {
    key: "adaptive",
    title: "A more balanced response",
    help: "Using the answers above, write a response to the automatic thought that feels more accurate or balanced.",
    fields: [
      { key: "adaptiveResponse", type: "textarea", label: "Adaptive / balanced response", placeholder: "" },
      { key: "adaptiveBelief", type: "slider", label: "How much do you believe this new response?", min: 0, max: 100, suffix: "%", default: 50 },
    ],
  },
  {
    key: "outcome",
    title: "How do you feel now?",
    help: "Re-rate the automatic thought and the emotion now that you’ve worked through it.",
    fields: [
      { key: "outcomeBelief", type: "slider", label: "How much do you believe the original thought now?", min: 0, max: 100, suffix: "%", default: 50 },
      { key: "outcomeIntensity", type: "slider", label: "How intense is the emotion now?", min: 0, max: 100, suffix: "%", default: 50 },
      { key: "nextAction", type: "textarea", label: "What would be good to do next?", placeholder: "One small step" },
    ],
  },
  {
    key: "review",
    title: "Review and save",
    help: "Take a quick look. When you’re ready, save the record.",
    review: true,
  },
];

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
function localISOForInput(d) {
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function freshAnswers() {
  return {
    datetime: localISOForInput(new Date()),
    situation: "", automaticThought: "", thoughtBelief: 50,
    emotion: "", emotionIntensity: 50, distortions: [],
    evidenceFor: "", evidenceAgainst: "", alternative: "",
    coping: "", effect: "", friend: "",
    adaptiveResponse: "", adaptiveBelief: 50,
    outcomeBelief: 50, outcomeIntensity: 50, nextAction: "",
  };
}

const state = {
  view: "quiz",
  stepIndex: 0,
  saved: null,
  saveError: null,
  answers: freshAnswers(),
  entries: null,
  entriesLoading: false,
  entriesError: null,
  currentEntry: null,
  entryLoading: false,
  entryError: null,
};

// ---------------------------------------------------------------------------
// Routing
// ---------------------------------------------------------------------------
function goToQuiz() {
  state.view = "quiz";
  state.stepIndex = 0;
  state.saved = null;
  state.saveError = null;
  state.answers = freshAnswers();
  state.currentEntry = null;
  state.entryError = null;
  render();
  window.scrollTo({ top: 0 });
}

function goToList() {
  state.view = "list";
  state.entriesLoading = true;
  state.entriesError = null;
  render();
  fetch("/api/cbt/entries")
    .then(r => r.json())
    .then(data => {
      if (!data.ok) throw new Error(data.error || "Failed to load");
      state.entries = data.entries;
      state.entriesLoading = false;
      render();
    })
    .catch(e => {
      state.entriesError = e.message;
      state.entriesLoading = false;
      render();
    });
}

function goToEntry(filename) {
  state.view = "entry";
  state.entryLoading = true;
  state.entryError = null;
  state.currentEntry = null;
  render();
  fetch("/api/cbt/entries/" + encodeURIComponent(filename))
    .then(r => r.json())
    .then(data => {
      if (!data.ok) throw new Error(data.error || "Failed to load");
      state.currentEntry = { filename: data.filename, record: data.record };
      state.entryLoading = false;
      render();
    })
    .catch(e => {
      state.entryError = e.message;
      state.entryLoading = false;
      render();
    });
}

// ---------------------------------------------------------------------------
// Formatting helpers
// ---------------------------------------------------------------------------
function formatDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleString(undefined, {
    weekday: "short", year: "numeric", month: "short", day: "numeric",
    hour: "numeric", minute: "2-digit",
  });
}

function nonEmpty(value) {
  if (Array.isArray(value)) return value.length > 0;
  return value != null && String(value).trim() !== "";
}

// ---------------------------------------------------------------------------
// Section builder (shared by review step and entry detail)
// ---------------------------------------------------------------------------
function buildSections(r) {
  const S = [
    { heading: "When", value: formatDate(r.datetime) },
    { heading: "Situation", value: r.situation },
    { heading: "Automatic thought", value: r.automaticThought ? `${r.automaticThought}   ·   believed ${r.thoughtBelief}%` : "" },
    { heading: "Emotion", value: r.emotion ? `${r.emotion}   ·   intensity ${r.emotionIntensity}%` : "" },
    { heading: "Cognitive distortions", isList: true, items: r.distortions || [] },
    { heading: "Evidence the thought is true", value: r.evidenceFor },
    { heading: "Evidence the thought is not true", value: r.evidenceAgainst },
    { heading: "Alternative explanation", value: r.alternative },
    { heading: "Coping — worst / best / realistic", value: r.coping },
    { heading: "Effect of believing vs. changing it", value: r.effect },
    { heading: "What you’d tell a friend", value: r.friend },
    { heading: "Adaptive response", value: r.adaptiveResponse ? `${r.adaptiveResponse}   ·   believed ${r.adaptiveBelief}%` : "" },
    { heading: "Outcome", value: `Original thought now believed ${r.outcomeBelief}% · emotion ${r.outcomeIntensity}%${r.nextAction ? "\nNext: " + r.nextAction : ""}` },
  ];
  return S.map(s => {
    const isEmpty = s.isList ? !(s.items && s.items.length) : !(s.value && String(s.value).trim());
    return { heading: s.heading, isList: !!s.isList, items: s.items || [], value: s.value || "", isEmpty };
  });
}

function renderSectionBlock(sec, sectionClass) {
  const block = document.createElement("div");
  block.className = sectionClass;

  const h = document.createElement("h3");
  h.textContent = sec.heading;
  block.appendChild(h);

  if (sec.isEmpty) {
    const p = document.createElement("p");
    p.className = "blank";
    p.textContent = "Left blank";
    block.appendChild(p);
  } else if (sec.isList) {
    const ul = document.createElement("ul");
    sec.items.forEach(item => {
      const li = document.createElement("li");
      li.textContent = item;
      ul.appendChild(li);
    });
    block.appendChild(ul);
  } else {
    const p = document.createElement("p");
    p.textContent = sec.value;
    block.appendChild(p);
  }

  return block;
}

// ---------------------------------------------------------------------------
// Header
// ---------------------------------------------------------------------------
const headerEl = document.getElementById("header");
const card = document.getElementById("card");

function renderHeader() {
  headerEl.innerHTML = "";

  const titleBlock = document.createElement("div");
  titleBlock.className = "title-block";

  const backLink = document.createElement("a");
  backLink.className = "text-link";
  if (state.view === "entry") {
    backLink.href = "#";
    backLink.textContent = "← Back to entries";
    backLink.addEventListener("click", e => { e.preventDefault(); goToList(); });
  } else {
    backLink.href = "/";
    backLink.textContent = "← Home";
  }

  const h1 = document.createElement("h1");
  h1.textContent = "Thought Record";

  titleBlock.appendChild(backLink);
  titleBlock.appendChild(h1);

  if (state.view === "list") {
    const sub = document.createElement("p");
    sub.className = "subtitle";
    sub.textContent = "Your past thought records, newest first.";
    titleBlock.appendChild(sub);
  } else if (state.view === "entry") {
    const sub = document.createElement("p");
    sub.className = "subtitle";
    sub.textContent = "Saved thought record.";
    titleBlock.appendChild(sub);
  }

  const action = document.createElement("div");
  action.className = "header-action";

  if (state.view === "quiz") {
    const link = document.createElement("button");
    link.className = "text-link";
    link.textContent = "View past entries →";
    link.addEventListener("click", goToList);
    action.appendChild(link);
  }

  headerEl.appendChild(titleBlock);
  headerEl.appendChild(action);
}

// ---------------------------------------------------------------------------
// Field renderer
// ---------------------------------------------------------------------------
function renderField(field) {
  const wrap = document.createElement("div");

  if (field.label) {
    const label = document.createElement("label");
    label.className = "field-label";
    label.textContent = field.label;
    wrap.appendChild(label);
  }

  if (field.type === "textarea") {
    const ta = document.createElement("textarea");
    ta.rows = 5;
    ta.value = state.answers[field.key] || "";
    ta.placeholder = field.placeholder || "";
    ta.addEventListener("input", e => { state.answers[field.key] = e.target.value; });
    wrap.appendChild(ta);
    return wrap;
  }

  if (field.type === "text") {
    const input = document.createElement("input");
    input.type = "text";
    input.value = state.answers[field.key] || "";
    input.placeholder = field.placeholder || "";
    input.addEventListener("input", e => { state.answers[field.key] = e.target.value; });
    wrap.appendChild(input);
    return wrap;
  }

  if (field.type === "datetime-local") {
    const input = document.createElement("input");
    input.type = "datetime-local";
    input.value = state.answers[field.key] || "";
    input.addEventListener("input", e => { state.answers[field.key] = e.target.value; });
    wrap.appendChild(input);
    return wrap;
  }

  if (field.type === "slider") {
    const row = document.createElement("div");
    row.className = "slider-row";
    const slider = document.createElement("input");
    slider.type = "range";
    slider.min = field.min;
    slider.max = field.max;
    slider.value = state.answers[field.key] ?? field.default ?? 0;
    const valueEl = document.createElement("span");
    valueEl.className = "slider-value";
    valueEl.textContent = slider.value + (field.suffix || "");
    slider.addEventListener("input", e => {
      state.answers[field.key] = Number(e.target.value);
      valueEl.textContent = e.target.value + (field.suffix || "");
    });
    row.appendChild(slider);
    row.appendChild(valueEl);
    wrap.appendChild(row);
    return wrap;
  }

  if (field.type === "distortions") {
    const list = document.createElement("div");
    list.className = "distortions";
    DISTORTIONS.forEach(d => {
      const row = document.createElement("label");
      row.className = "distortion";

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = state.answers.distortions.includes(d.name);
      if (cb.checked) row.classList.add("checked");

      const box = document.createElement("span");
      box.className = "distortion-box";
      if (cb.checked) box.textContent = "✓";

      cb.addEventListener("change", e => {
        if (e.target.checked) {
          if (!state.answers.distortions.includes(d.name)) {
            state.answers.distortions.push(d.name);
          }
          row.classList.add("checked");
          box.textContent = "✓";
        } else {
          state.answers.distortions = state.answers.distortions.filter(x => x !== d.name);
          row.classList.remove("checked");
          box.textContent = "";
        }
      });

      const text = document.createElement("div");
      const name = document.createElement("div");
      name.className = "distortion-name";
      name.textContent = d.name;
      const desc = document.createElement("div");
      desc.className = "distortion-desc";
      desc.textContent = d.desc;
      text.appendChild(name);
      text.appendChild(desc);

      row.appendChild(cb);
      row.appendChild(box);
      row.appendChild(text);
      list.appendChild(row);
    });
    wrap.appendChild(list);
    return wrap;
  }

  return wrap;
}

// ---------------------------------------------------------------------------
// Review step renderer
// ---------------------------------------------------------------------------
function renderReview() {
  const wrap = document.createElement("div");
  wrap.className = "review";
  buildSections(state.answers).forEach(sec => {
    wrap.appendChild(renderSectionBlock(sec, "review-section"));
  });
  return wrap;
}

// ---------------------------------------------------------------------------
// View renderers
// ---------------------------------------------------------------------------
function renderQuiz() {
  if (state.saved) {
    renderSaved();
    return;
  }

  card.style.padding = "";
  card.innerHTML = "";

  const step = STEPS[state.stepIndex];

  // Progress bar (inside card per design)
  const progressWrap = document.createElement("div");
  progressWrap.className = "progress";
  const progressFill = document.createElement("div");
  progressFill.style.width = (state.stepIndex / (STEPS.length - 1)) * 100 + "%";
  progressWrap.appendChild(progressFill);
  card.appendChild(progressWrap);

  // Eyebrow
  const eyebrow = document.createElement("p");
  eyebrow.className = "step-eyebrow";
  eyebrow.textContent = `Step ${state.stepIndex + 1} of ${STEPS.length}`;
  card.appendChild(eyebrow);

  // Title + help
  const title = document.createElement("h2");
  title.className = "step-title";
  title.textContent = step.title;
  card.appendChild(title);

  if (step.help) {
    const help = document.createElement("p");
    help.className = "step-help";
    help.textContent = step.help;
    card.appendChild(help);
  }

  // Fields or review
  if (step.review) {
    card.appendChild(renderReview());
  } else {
    const fieldGroup = document.createElement("div");
    fieldGroup.className = "field-group";
    step.fields.forEach(f => fieldGroup.appendChild(renderField(f)));
    card.appendChild(fieldGroup);
  }

  // Save error
  if (state.saveError) {
    const err = document.createElement("div");
    err.className = "error";
    err.textContent = "Could not save: " + state.saveError;
    card.appendChild(err);
  }

  // Bottom nav
  const nav = document.createElement("div");
  nav.className = "actions";

  const back = document.createElement("button");
  back.className = "secondary";
  back.textContent = "Back";
  back.disabled = state.stepIndex === 0;
  back.addEventListener("click", () => {
    if (state.stepIndex > 0) {
      state.stepIndex--;
      state.saveError = null;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  });

  const spacer = document.createElement("div");
  spacer.className = "spacer";

  const next = document.createElement("button");
  if (state.stepIndex === STEPS.length - 1) {
    next.textContent = "Save";
    next.addEventListener("click", submit);
  } else {
    next.textContent = "Next";
    next.addEventListener("click", () => {
      state.stepIndex++;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  }

  nav.appendChild(back);
  nav.appendChild(spacer);
  nav.appendChild(next);
  card.appendChild(nav);
}

function renderSaved() {
  card.style.padding = "48px 38px";
  card.innerHTML = "";

  const wrap = document.createElement("div");
  wrap.className = "saved";

  const icon = document.createElement("div");
  icon.className = "saved-icon";
  icon.textContent = "✓";

  const h2 = document.createElement("h2");
  h2.textContent = "Saved";

  const desc = document.createElement("p");
  desc.style.cssText = "color:var(--muted);font-size:15px;margin:0";
  desc.textContent = "Your thought record was written to disk.";

  const fileWrap = document.createElement("p");
  fileWrap.style.marginTop = "14px";
  const code = document.createElement("code");
  code.textContent = state.saved && state.saved.filename ? state.saved.filename : "";
  fileWrap.appendChild(code);

  const actions = document.createElement("div");
  actions.className = "actions centered";

  const newBtn = document.createElement("button");
  newBtn.textContent = "Start another";
  newBtn.addEventListener("click", goToQuiz);

  const listBtn = document.createElement("button");
  listBtn.className = "secondary";
  listBtn.textContent = "View past entries";
  listBtn.addEventListener("click", goToList);

  actions.appendChild(newBtn);
  actions.appendChild(listBtn);

  wrap.appendChild(icon);
  wrap.appendChild(h2);
  wrap.appendChild(desc);
  wrap.appendChild(fileWrap);
  wrap.appendChild(actions);
  card.appendChild(wrap);
}

function renderList() {
  card.style.padding = "";
  card.innerHTML = "";

  // Top row: heading + CTA
  const listTop = document.createElement("div");
  listTop.className = "list-top";

  const h2 = document.createElement("h2");
  h2.textContent = "Past entries";

  const newBtn = document.createElement("button");
  newBtn.textContent = "New thought record";
  newBtn.addEventListener("click", goToQuiz);

  listTop.appendChild(h2);
  listTop.appendChild(newBtn);
  card.appendChild(listTop);

  if (state.entriesLoading) {
    const sk = document.createElement("p");
    sk.className = "skeleton";
    sk.textContent = "Loading…";
    card.appendChild(sk);
    return;
  }

  if (state.entriesError) {
    const err = document.createElement("div");
    err.className = "error";
    err.textContent = "Could not load entries: " + state.entriesError;
    card.appendChild(err);
    return;
  }

  if (!state.entries || state.entries.length === 0) {
    const empty = document.createElement("p");
    empty.className = "entry-empty";
    empty.textContent = "No entries yet — your saved thought records will show up here.";
    card.appendChild(empty);
    return;
  }

  const list = document.createElement("div");
  list.className = "entry-list";

  state.entries.forEach(e => {
    const item = document.createElement("button");
    item.className = "entry-item";
    item.addEventListener("click", () => goToEntry(e.filename));

    const date = document.createElement("div");
    date.className = "entry-date";
    date.textContent = formatDate(e.savedAt || e.datetime);
    item.appendChild(date);

    const summary = document.createElement("div");
    summary.className = "entry-summary";
    summary.textContent = e.summary || "(no description)";
    item.appendChild(summary);

    if (e.emotion || typeof e.emotionIntensity === "number") {
      const emo = document.createElement("div");
      emo.className = "entry-emotion";
      const parts = [];
      if (e.emotion) parts.push(e.emotion);
      if (typeof e.emotionIntensity === "number") parts.push(`${e.emotionIntensity}%`);
      emo.textContent = parts.join(" · ");
      item.appendChild(emo);
    }

    list.appendChild(item);
  });

  card.appendChild(list);
}

function renderEntry() {
  card.style.padding = "";
  card.innerHTML = "";

  if (state.entryLoading) {
    const sk = document.createElement("p");
    sk.className = "skeleton";
    sk.textContent = "Loading…";
    card.appendChild(sk);
    return;
  }

  if (state.entryError) {
    const err = document.createElement("div");
    err.className = "error";
    err.textContent = "Could not load entry: " + state.entryError;
    card.appendChild(err);
    return;
  }

  if (!state.currentEntry) return;

  const r = state.currentEntry.record;

  const meta = document.createElement("p");
  meta.className = "entry-meta";
  meta.textContent = formatDate(r.savedAt || r.datetime);
  card.appendChild(meta);

  const sectionsWrap = document.createElement("div");
  sectionsWrap.className = "entry-sections";
  buildSections(r).forEach(sec => {
    sectionsWrap.appendChild(renderSectionBlock(sec, "entry-section"));
  });
  card.appendChild(sectionsWrap);
}

// ---------------------------------------------------------------------------
// Top-level render
// ---------------------------------------------------------------------------
function render() {
  renderHeader();
  if (state.view === "quiz") renderQuiz();
  else if (state.view === "list") renderList();
  else if (state.view === "entry") renderEntry();
}

async function submit() {
  state.saveError = null;
  try {
    const res = await fetch("/api/cbt/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-CSRF-Token": await getCsrfToken() },
      body: JSON.stringify(state.answers),
    });
    const data = await res.json();
    if (!res.ok || !data.ok) {
      state.saveError = data.error || ("HTTP " + res.status);
      render();
      return;
    }
    state.saved = data;
    render();
    window.scrollTo({ top: 0 });
  } catch (e) {
    state.saveError = e.message;
    render();
  }
}

if (location.hash === "#list") {
  goToList();
} else {
  render();
}
</script>
<nav class="auth-bar"><a href="/api/logout">Sign out</a></nav>
</body>
</html>

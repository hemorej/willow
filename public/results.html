<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script src="/theme.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Willow — Past results</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#5f7d66" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <header class="top-bar">
      <a class="wordmark" href="/">
        <span class="wordmark-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20c0-7 3-13 11-16-1 8-4 13-11 16z"/><path d="M8.5 15.5C11 13 13 9.5 15 4"/></svg>
        </span>
        <span class="wordmark-name">Willow</span>
      </a>
      <div class="top-bar-right">
        <nav class="nav-cluster">
          <a class="nav-pill" href="/journal.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H12v18H6.5A2.5 2.5 0 0 1 4 18.5v-13z"/><path d="M20 5.5A2.5 2.5 0 0 0 17.5 3H12v18h5.5a2.5 2.5 0 0 0 2.5-2.5v-13z"/></svg>
            <span class="nav-pill-label">Log</span>
          </a>
          <a class="nav-pill active" href="/quiz.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-4 3 3 4-6"/></svg>
            <span class="nav-pill-label">BDI</span>
          </a>
          <a class="nav-pill" href="/cbt.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            <span class="nav-pill-label">CBT</span>
          </a>
        </nav>
      </div>
    </header>

    <header class="app-header">
      <div class="title-block">
        <a class="text-link" href="/">← Home</a>
        <h1>BDI-II Inventory</h1>
      </div>
    </header>

    <div class="card">
      <div class="results-top">
        <div>
          <h2>Past results</h2>
          <p class="muted" id="subtitle">Loading…</p>
        </div>
        <a class="btn" id="cta" href="/quiz.html" style="display:none">Start a new test</a>
      </div>

      <div id="chart-wrap" class="chart-wrap" style="display:none">
        <svg id="chart" viewBox="0 0 720 240" width="100%" height="230" preserveAspectRatio="none"></svg>
        <div id="note-tooltip" class="note-tooltip"></div>
      </div>
      <div class="legend" id="legend"></div>

      <ul id="results-list" class="results-list"></ul>

      <div class="pager" id="pager" style="display:none">
        <button class="secondary" id="pager-prev" type="button">← Newer</button>
        <span class="pager-label" id="pager-label"></span>
        <button class="secondary" id="pager-next" type="button">Older →</button>
      </div>

      <div id="empty" class="empty" style="display:none">
        <p>No results yet.</p>
        <a class="btn" href="/quiz.html">Take your first test</a>
      </div>
    </div>
  </div>

  <script src="/questions.js"></script>
  <script>
    const listEl      = document.getElementById('results-list');
    const noteTooltip = document.getElementById('note-tooltip');

    function escAttr(s) {
      return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    const subEl   = document.getElementById('subtitle');
    const empty   = document.getElementById('empty');
    const cta     = document.getElementById('cta');
    const chartWrap = document.getElementById('chart-wrap');
    const chart   = document.getElementById('chart');
    const legend  = document.getElementById('legend');
    const pager   = document.getElementById('pager');
    const pagerLabel = document.getElementById('pager-label');
    const pagerPrev  = document.getElementById('pager-prev');
    const pagerNext  = document.getElementById('pager-next');

    const PER_PAGE = 10;
    let allItems = [];
    let page = 0;

    function fmtDate(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString();
      } catch (e) { return iso; }
    }

    function buildChart(items) {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const gridStroke = isDark ? '#ffffff14' : '#00000018';
      const baselineStroke = isDark ? '#ffffff2b' : '#00000022';
      const axisColor = isDark ? 'var(--muted)' : '#8a8178';
      const bandOpacity = isDark ? 0.18 : 0.12;

      // items are sorted desc by takenAt; chart wants ascending in time.
      const data = [...items].reverse();
      const W = 720, H = 240;
      const padL = 34, padR = 14, padT = 14, padB = 34;
      const innerW = W - padL - padR;
      const innerH = H - padT - padB;

      // Y: 0..MAX_SCORE
      const yFor = (s) => padT + innerH - (s / MAX_SCORE) * innerH;
      // X: equally spaced
      const n = data.length;
      const xFor = (i) => {
        if (n === 1) return padL + innerW / 2;
        return padL + (i / (n - 1)) * innerW;
      };

      const parts = [];

      // Severity bands as horizontal shaded rectangles
      SEVERITY_BANDS.forEach((b) => {
        const yTop = yFor(b.max);
        const yBot = yFor(Math.max(0, b.min - 1)); // include band fully
        const h = yBot - yTop;
        parts.push(
          `<rect x="${padL}" y="${yTop}" width="${innerW}" height="${h}" fill="${b.color}" fill-opacity="${bandOpacity}" />`
        );
      });

      // Y axis ticks at band cutoffs
      const ticks = [0, 13, 19, 27, 60];
      ticks.forEach((t) => {
        const y = yFor(t);
        parts.push(
          `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="${gridStroke}" stroke-width="1" stroke-dasharray="2,3" />`
        );
        parts.push(
          `<text x="${padL - 6}" y="${y + 4}" font-size="10" fill="${axisColor}" text-anchor="end" font-family="Hanken Grotesque, sans-serif">${t}</text>`
        );
      });

      // X axis baseline
      parts.push(
        `<line x1="${padL}" y1="${padT + innerH}" x2="${W - padR}" y2="${padT + innerH}" stroke="${baselineStroke}" stroke-width="1" />`
      );

      // Line path
      if (n > 0) {
        const d = data
          .map((it, i) => `${i === 0 ? 'M' : 'L'} ${xFor(i).toFixed(1)} ${yFor(it.totalScore).toFixed(1)}`)
          .join(' ');
        parts.push(
          `<path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" />`
        );
      }

      // X labels (every result if few; sample otherwise)
      const labelEvery = Math.max(1, Math.ceil(n / 6));
      data.forEach((it, i) => {
        const x = xFor(i);
        const y = yFor(it.totalScore);
        const band = severityFor(it.totalScore);
        parts.push(
          `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="${band.color}" stroke="var(--card)" stroke-width="1.5">
             <title>${fmtDate(it.takenAt)} — score ${it.totalScore} (${band.name})</title>
           </circle>`
        );
        if (i % labelEvery === 0 || i === n - 1) {
          const dt = new Date(it.takenAt);
          const label = `${dt.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}`;
          parts.push(
            `<text x="${x.toFixed(1)}" y="${(padT + innerH + 18).toFixed(1)}" font-size="10" fill="${axisColor}" text-anchor="middle" font-family="Hanken Grotesque, sans-serif">${label}</text>`
          );
        }

        if (it.note) {
          const nx = (x + 1).toFixed(1);
          const ny = (y - 16).toFixed(1);
          parts.push(
            `<g class="note-icon" data-note="${escAttr(it.note)}" style="cursor:pointer">` +
              `<circle cx="${nx}" cy="${ny}" r="7" fill="var(--accent)" stroke="var(--card)" stroke-width="1.5"/>` +
              `<text x="${nx}" y="${ny}" font-size="9" fill="var(--on-accent)" text-anchor="middle" dy="3.2" font-family="sans-serif" pointer-events="none">✎</text>` +
            `</g>`
          );
        }
      });

      chart.innerHTML = parts.join('');

      chart.querySelectorAll('.note-icon').forEach((icon) => {
        icon.addEventListener('mouseenter', () => {
          noteTooltip.textContent = icon.getAttribute('data-note');
          noteTooltip.style.display = 'block';
        });
        icon.addEventListener('mousemove', (e) => {
          const wrap = chartWrap.getBoundingClientRect();
          noteTooltip.style.left = (e.clientX - wrap.left + 14) + 'px';
          noteTooltip.style.top  = (e.clientY - wrap.top  - 12) + 'px';
        });
        icon.addEventListener('mouseleave', () => {
          noteTooltip.style.display = 'none';
        });
      });

      // Legend
      legend.innerHTML = SEVERITY_BANDS.map(
        (b) => `<span><span class="swatch" style="background:${b.color}"></span>${b.name} (${b.min}–${b.max})</span>`
      ).join('');
    }

    function renderPage() {
      const totalPages = Math.max(1, Math.ceil(allItems.length / PER_PAGE));
      page = Math.min(page, totalPages - 1);
      const start = page * PER_PAGE;
      const pageItems = allItems.slice(start, start + PER_PAGE);

      listEl.innerHTML = '';
      pageItems.forEach((it) => {
        const band = severityFor(it.totalScore);
        const li = document.createElement('li');
        li.innerHTML = `
          <span class="date">${fmtDate(it.takenAt)}</span>
          ${it.note ? `<span class="note-flag" title="${escAttr(it.note)}">&#9998;</span>` : ''}
          <span class="severity-pill" style="background:${band.color}">${band.name}</span>
          <span class="score">${it.totalScore}/60</span>
        `;
        listEl.appendChild(li);
      });

      if (totalPages > 1) {
        pager.style.display = '';
        pagerLabel.textContent = `${start + 1}–${start + pageItems.length} of ${allItems.length}`;
        pagerPrev.disabled = page === 0;
        pagerNext.disabled = page >= totalPages - 1;
      } else {
        pager.style.display = 'none';
      }
    }

    pagerPrev.addEventListener('click', () => {
      if (page > 0) { page -= 1; renderPage(); }
    });
    pagerNext.addEventListener('click', () => {
      const totalPages = Math.max(1, Math.ceil(allItems.length / PER_PAGE));
      if (page < totalPages - 1) { page += 1; renderPage(); }
    });

    async function load() {
      let items = [];
      try {
        const resp = await fetch('/api/results');
        const data = await resp.json();
        items = data.results || [];
      } catch (e) {
        subEl.textContent = 'Could not load results.';
        return;
      }

      if (items.length === 0) {
        subEl.style.display = 'none';
        empty.style.display = '';
        return;
      }

      allItems = items;
      page = 0;

      subEl.textContent = `${items.length} result${items.length === 1 ? '' : 's'}, sorted from newest to oldest.`;
      cta.style.display = '';
      chartWrap.style.display = '';
      buildChart(items);
      renderPage();
    }

    load();

    // Rebuild with theme-correct colors if the auto schedule flips while open.
    window.addEventListener('willow:theme-change', () => {
      if (allItems.length) buildChart(allItems);
    });
  </script>
  <nav class="auth-bar"><a href="/api/logout">Sign out</a></nav>
</body>
</html>

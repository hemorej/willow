<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script src="/theme.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — Willow</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <p class="date-eyebrow" style="color:var(--accent)">Willow</p>
      <h1 class="login-title">Sign in</h1>
      <form method="post" action="/api/login" class="login-form" id="login-form">
        <input type="hidden" name="next" id="next-field" value="/" />
        <label class="field-label" for="username">Username</label>
        <input class="field-input" type="text" id="username" name="username"
               autocomplete="username" autofocus required />
        <label class="field-label" for="password">Password</label>
        <input class="field-input" type="password" id="password" name="password"
               autocomplete="current-password" required />
        <button class="btn login-submit" type="submit">Sign in</button>
      </form>
    </div>
  </div>
  <script>
    const p = new URLSearchParams(location.search);
    const next = p.get('next');
    if (next) document.getElementById('next-field').value = next;
    if (p.get('error')) {
      const msg = document.createElement('p');
      msg.className = 'login-error';
      msg.textContent = 'Invalid username or password.';
      document.getElementById('login-form').before(msg);
    }
  </script>
</body>
</html>
